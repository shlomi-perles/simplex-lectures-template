name: Update Simplex

on:
  repository_dispatch:
    types: [manim-simplex-release]
  workflow_dispatch:
    inputs:
      version:
        description: manim-simplex version without the leading v
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SIMPLEX_VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Update dependency and lockfile
        run: |
          uv remove simplex-web || true
          uv add "manim-simplex>=${SIMPLEX_VERSION}"
          uv lock --upgrade-package manim-simplex
          uv sync --locked

      - name: Lint
        run: uv run --locked ruff check .

      - name: Open update PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-manim-simplex-${{ env.SIMPLEX_VERSION }}
          commit-message: "chore(deps): update manim-simplex to v${{ env.SIMPLEX_VERSION }}"
          title: "chore(deps): update manim-simplex to v${{ env.SIMPLEX_VERSION }}"
          body: |
            Updates the lectures template after the `manim-simplex` release.

            - removes the retired `simplex-web` dependency
            - updates `manim-simplex`
            - refreshes `uv.lock`
          labels: dependencies
