name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIMPLEX_BASE_URL: ${{ vars.SIMPLEX_BASE_URL || format('/{0}', github.event.repository.name) }}
      SIMPLEX_GA_TAG: ${{ secrets.GA_TAG }}
      SIMPLEX_PREVIEW: "0"
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-science \
                                  ffmpeg fontconfig fonts-jetbrains-mono libcairo2-dev libpango1.0-dev \
                                  libegl1 libgl1-mesa-dri libgles2
          fc-match "JetBrains Mono" | grep -qi "JetBrainsMono"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync
        run: uv sync --locked

      - name: Lint
        run: uv run --locked ruff check .

      - name: Build site
        run: uv run --locked simplex build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
